top_k: 20

model:
  name: qwen3-8b
  temperature: 0.1
  max_tokens: 512

retrieval:
  dense_weight: 0.7
  bm25_weight: 0.3
  top_k: 40
  expand_graph: false

scoring:
  scale: 5
  confidence_threshold: 0.6

data:
  raw_dir: data/index
  processed_dir: data/processed
  index_dir: data/index
  cache_dir: data/cache
  knowledge_graph_dir: data/knowledge_graph

logging:
  level: INFO
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"